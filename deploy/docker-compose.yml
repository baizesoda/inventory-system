# ============== 库存管理系统 Docker Compose 编排 ==============
# 使用方法:
#   开发环境: docker compose up -d
#   生产环境: 先准备 .env 文件, 再执行 docker compose --env-file .env up -d

version: '3.8'

services:
  # ---------- 数据库(MySQL 8.0) ----------
  db:
    image: mysql:8.0
    container_name: inventory_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-inventory_pass}
      MYSQL_DATABASE: ${DB_NAME:-inventory_db}
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------- Web 应用(Django + Gunicorn) ----------
  web:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: inventory_web
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DJANGO_DEBUG: 'False'
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-django-insecure-change-me}
      DB_ENGINE: mysql
      DB_NAME: ${DB_NAME:-inventory_db}
      DB_USER: root
      DB_PASSWORD: ${DB_PASSWORD:-inventory_pass}
      DB_HOST: db
      DB_PORT: 3306
    volumes:
      - static_files:/app/staticfiles
      - media_files:/app/media
    expose:
      - "8000"
    # 启动前执行迁移 + 初始化演示数据(首次)
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py init_demo &&
             python manage.py collectstatic --noinput &&
             gunicorn --bind 0.0.0.0:8000 --workers 3
                    --config deploy/gunicorn.conf.py
                    inventory_system.wsgi:application"

  # ---------- Nginx 反向代理 ----------
  nginx:
    image: nginx:1.25-alpine
    container_name: inventory_nginx
    restart: unless-stopped
    depends_on:
      - web
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_files:/usr/share/nginx/static:ro
      - media_files:/usr/share/nginx/media:ro

volumes:
  mysql_data:
  static_files:
  media_files:
