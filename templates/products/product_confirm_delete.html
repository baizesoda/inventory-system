{% extends 'base.html' %}
{% block title %}删除商品 - {{ product.name }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card border-danger">
            <div class="card-header bg-danger text-white">
                <i class="bi bi-exclamation-triangle"></i> 确认删除商品
            </div>
            <div class="card-body">
                <p>您即将删除商品 <code>{{ product.sku }}</code> <strong>{{ product.name }}</strong>。</p>
                <p class="text-danger">注意: 该商品的 {{ records|length }} 条出入库历史记录将保留(商品将被保护性删除)。</p>
                <form method="post">
                    {% csrf_token %}
                    <a href="{% url 'products:detail' product.pk %}" class="btn btn-secondary">取消</a>
                    <button type="submit" class="btn btn-danger">
                        <i class="bi bi-trash"></i> 确认删除
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
