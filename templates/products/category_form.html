{% extends 'base.html' %}
{% block title %}{{ title }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h4 class="mb-3"><i class="bi bi-tags"></i> {{ title }}</h4>
        <div class="card">
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    {% for field in form %}
                    <div class="mb-3">
                        <label class="form-label">{{ field.label }}</label>
                        {{ field }}
                        {% if field.errors %}<div class="text-danger small">{{ field.errors }}</div>{% endif %}
                        {% if field.help_text %}<div class="form-text">{{ field.help_text }}</div>{% endif %}
                    </div>
                    {% endfor %}
                    <div class="text-end">
                        <a href="{% url 'products:category_list' %}" class="btn btn-secondary">取消</a>
                        <button class="btn btn-primary"><i class="bi bi-save"></i> 保存</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
